<text x="120" y="1640" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="#4d5a61" text-anchor="start">Wire colors in this diagram: red = +6 V, black = ground, blue dashed = ESP32 servo signal.</text>
<text x="120" y="1690" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="400" fill="#7a2f2f" text-anchor="start">*Check your ESP32 DevKit regulator before feeding 6 V into VIN/5V. Use a separate 5 V regulator if your board requires it.</text>
<text x="120" y="1730" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="400" fill="#7a2f2f" text-anchor="start">Do not power the servos from the ESP32 3.3 V pin. All servo grounds and ESP32 ground must be connected together.</text>
